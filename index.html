<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;

    background: radial-gradient(circle at top, #1a1a1a, #000);
}

/* Container */
.container {
    max-width: 420px;
    margin: auto;
    padding: 60px 20px;
}

/* Profil */
.profile img {
    width: 110px;
    border-radius: 50%;
    margin-bottom: 15px;
    border: 2px solid #00ffcc;
    transition: 0.3s;
}

.profile img:hover {
    transform: scale(1.05);
}

/* Text */
h1 {
    font-size: 26px;
}

.bio {
    color: #aaa;
    margin-bottom: 30px;
}

/* BUTTONS (schmaler + zentriert) */
.button {
    display: block;
    width: 80%;
    margin: 14px auto;
    padding: 15px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.25s;
}

/* TikTok */
.tiktok {
    background: linear-gradient(90deg, #00f2ea, #ff0050);
    color: white;
}

/* Instagram */
.instagram {
    background: linear-gradient(90deg, #feda75, #d62976, #962fbf);
    color: white;
}

/* Hover + Glow Effekt */
.button:hover {
    transform: scale(1.06);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

/* Smooth Fade unten */
.bottom-fade {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 120px;
    pointer-events: none;

    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0),
        rgba(0,0,0,0.6),
        rgba(0,0,0,1)
    );
}
</style>
</head>

<body>

<div class="container">

    <div class="profile">
        <img src="IMG_4801.jpeg">
        <h1>@pavluscha05</h1>
        <p class="bio">Mehr Content hier 👇🔥</p>
    </div>

    <a href="https://www.tiktok.com/@pavluscha05" class="button tiktok">
        🎬 TikTok ansehen
    </a>

    <a href="https://www.instagram.com/paul26310" class="button instagram">
        📸 Instagram folgen
    </a>

</div>

<div class="bottom-fade"></div>

</body>
</html>
