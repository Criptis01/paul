<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;

    background: 
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95)),
        url("IMG_4809.jpeg") no-repeat center center;

    background-size: cover;
    background-attachment: fixed;
}
.bg-video {
    width: 90%;
    max-width: 400px;
    border-radius: 20px;
    margin: 20px auto;
    display: block;
    opacity: 0.85;
}

/* Container */
.container {
    max-width: 420px;
    margin: auto;
    padding: 60px 20px 120px; /* extra Platz unten */
}

/* Profil */
.profile img {
    width: 110px;
    border-radius: 50%;
    margin-bottom: 15px;
}

/* Text */
h1 {
    font-size: 26px;
}

.bio {
    color: #aaa;
    margin-bottom: 30px;
}

/* Buttons */
.button {
    display: block;
    width: 80%;
    margin: 14px auto;
    padding: 15px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.25s;

    color: #ff9bbd; /* hell rosa */
}

.tiktok {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
}

.instagram {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
}

.button:hover {
    transform: scale(1.06);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

/* VISITENKARTE */
.card-section {
    margin-top: 60px;
}

.card-section p {
    color: #bbb;
    margin-bottom: 15px;
}

.card-section img {
    width: 90%;
    border-radius: 16px;
    box-shadow: 0 0 25px rgba(255,255,255,0.1);
}

/* Smooth Fade */
.bottom-fade {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 150px;
    pointer-events: none;

    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0),
        rgba(0,0,0,0.7),
        rgba(0,0,0,1)
    );
}
</style>
</head>

<body>

<div class="container">

    <div class="profile">
        <img src="IMG_4801.jpeg">
        <h1>paul r</h1>
        <p class="bio">Mehr Content hier 👇🔥</p>
    </div>

    <a href="https://www.tiktok.com/@pavluscha05" class="button tiktok">
        🎬 TikTok ansehen
    </a>

    <a href="https://www.instagram.com/paul26310" class="button instagram">
        📸 Instagram folgen
    </a>

    <!-- VISITENKARTE -->
    <div class="card-section">
        <p>Diese Karte hast du wahrscheinlich bekommen 👇</p>
        <img src="84148C11-0996-45CB-BEEF-3243EE104FA7.png">
    </div>

</div>

<div class="bottom-fade"></div>

</body>
</html>
<video autoplay muted loop playsinline class="bg-video">
    <source src="Mbike.MP4" type="video/mp4">
</video>
