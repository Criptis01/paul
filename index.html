<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #000, #111);
    color: white;
    text-align: center;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 50px 20px;
}

.profile img {
    width: 110px;
    border-radius: 50%;
    margin-bottom: 15px;
    border: 2px solid #00ffcc;
}

h1 {
    font-size: 26px;
}

.bio {
    color: #aaa;
    margin-bottom: 30px;
}

/* BUTTONS */
.button {
    display: block;
    padding: 16px;
    margin: 12px 0;
    border-radius: 14px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.2s;
}

.tiktok {
    background: linear-gradient(90deg, #00f2ea, #ff0050);
    color: white;
}

.instagram {
    background: linear-gradient(90deg, #feda75, #d62976, #962fbf);
    color: white;
}

.button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

    <div class="profile">
        <img src="https://via.placeholder.com/110">
        <h1>@Paul</h1>
        <p class="bio">Mehr Content hier 👇🔥</p>
    </div>

    <a href="https://www.tiktok.com/@pavluscha05" class="button tiktok">🎬 TikTok ansehen</a>

    <a href="https://www.instagram.com/paul26310" class="button instagram">📸 Instagram folgen</a>

</div>

</body>
</html>
